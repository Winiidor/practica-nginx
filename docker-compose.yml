services:
  apache1:
    image: httpd:latest
    volumes:
      - ./web:/usr/local/apache2/htdocs/

  apache2:
    image: httpd:latest
    volumes:
      - ./web:/usr/local/apache2/htdocs/

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - apache1
      - apache2
