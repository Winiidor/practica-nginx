proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=mycache:10m;

upstream backend {
    server apache1:80;
    server apache2:80;
}

server {
    listen 80;

    location / {
        proxy_pass http://backend;

        proxy_cache mycache;
        proxy_cache_valid 200 10m;

        add_header X-Cache $upstream_cache_status;
    }
}

